<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIDAS - Students</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6C5CE7">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== GLOBAL ===== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html, body {
  width: 100%;
  height: 100%;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#6C5CE7,#A29BFE,#74B9FF);
}
body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 0;
}

/* ===== CONTAINER ===== */
.container {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius: 0;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  position: relative;
  padding-bottom: 120px; /* Space for bottom nav */
}

/* ===== HEADER ===== */
.header {
  padding: 20px;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
}

/* ===== PROFILE ===== */
.profile {
  width: 80px;
  height: 80px;
  margin: -40px auto 10px;
  background: linear-gradient(135deg,#9D7BC9,#7B56A3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 30px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* ===== CONTENT ===== */
.content {
  padding: 20px;
  flex: 1;
  overflow-y: auto;
}

/* ===== SEARCH ===== */
.input-group {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.95);
  border-radius: 15px;
  padding: 0 15px;
  margin-bottom: 15px;
}
.input-group i {
  color: #7B56A3;
}
.input-group input {
  width: 100%;
  padding: 14px;
  border: none;
  outline: none;
  background: transparent;
  font-size: 16px;
}

/* ===== ADD STUDENT BUTTON ===== */
.add-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 15px;
  background: linear-gradient(135deg,#9D7BC9,#7B56A3);
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 15px;
  text-align: center;
  font-size: 16px;
  transition: 0.3s;
}
.add-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

/* ===== STUDENT CARD ===== */
.student-card {
  background: rgba(255,255,255,0.9);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
  transition: 0.3s;
}
.student-card:hover {
  transform: translateY(-5px);
}
.student-top {
  display: flex;
  justify-content: space-between;
}
.student-name {
  font-weight: bold;
  color: #2c3e50;
}
.actions i {
  margin-left: 10px;
  cursor: pointer;
}
.status {
  margin-top: 8px;
  padding: 5px 10px;
  border-radius: 10px;
  display: inline-block;
  font-size: 12px;
  color: white;
}
.present { background: #4CAF50; }
.absent { background: #f44336; }

/* ===== NAV ===== */
.bottom-nav {
  position: fixed;      
  bottom: 0;            
  left: 0;              
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: rgba(0,0,0,0.2);
  z-index: 1000;
}
.nav-item {
  text-align: center;
  color: white;
  font-size: 12px;
  opacity: 0.7;
  text-decoration: none;
}
.nav-item.active {
  opacity: 1;
  font-weight: bold;
}

/* ===== SCROLLBAR ===== */
.content::-webkit-scrollbar {
  width: 8px;
}
.content::-webkit-scrollbar-thumb {
  background: rgba(123,86,163,0.5);
  border-radius: 4px;
}

/* ===== MOBILE ===== */
@media(max-width:500px){
  .container {
    width: 100%;
    height: 100vh;
    border-radius: 0;
  }
}
</style>
</head>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log('✅ Service Worker Registered'))
      .catch(err => console.log('❌ SW Error:', err));
  });
}
</script>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div><i class="fas fa-users"></i> Students</div>
    <div onclick="history.back()" style="cursor:pointer;">
      <i class="fas fa-arrow-left"></i>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="profile">
    <i class="fas fa-users"></i>
  </div>

  <div class="content">
    <!-- SEARCH -->
    <div class="input-group">
      <i class="fas fa-search"></i>
      <input type="text" id="search" placeholder="Search students...">
    </div>

    <!-- ADD STUDENT BUTTON -->
    <div class="add-btn" onclick="window.location.href='add-student.html'">
      <i class="fas fa-plus"></i> Add Student
    </div>

    <!-- STUDENT LIST -->
    <div id="studentList"></div>
  </div>

  <!-- NAV -->
  <div class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <i class="fas fa-chart-line"></i><br>
      Dashboard
    </a>
    <div class="nav-item active">
      <i class="fas fa-users"></i><br>Students
    </div>
  </div>

</div>

<script>
/* Load students from localStorage */
let students = JSON.parse(localStorage.getItem("students")) || [];

/* Render function */
function render(list = students){
  const box = document.getElementById("studentList");
  box.innerHTML = "";
  if(list.length === 0){
    box.innerHTML = "<p style='color:white;text-align:center;margin-top:20px;'>No students added yet.</p>";
    return;
  }
  list.forEach((s,i)=>{
    box.innerHTML += `
      <div class="student-card">
        <div class="student-top">
          <div class="student-name">${s.name}</div>
          <div class="actions">
            <i class="fas fa-trash" onclick="del(${i})"></i>
          </div>
        </div>
        <div>ID: ${s.id}</div>
        <div>Email: ${s.email}</div>
        <div>Course: ${s.course} (${s.year})</div>
        <div>Schedule: ${s.schedule}</div>
        <div class="status ${s.status==='Present'?'present':'absent'}">${s.status}</div>
      </div>
    `;
  });
}

/* Delete student */
function del(i){
  students.splice(i,1);
  localStorage.setItem("students", JSON.stringify(students));
  render();
}

/* Search students */
document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();
  const filtered = students.filter(s =>
    s.name.toLowerCase().includes(val) ||
    s.id.toLowerCase().includes(val)
  );
  render(filtered);
});

/* Initial render */
render();
</script>
</body>
</html>
