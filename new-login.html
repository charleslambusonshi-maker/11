<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIDAS • Login</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6C5CE7">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body, html {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(135deg,#6C5CE7,#A29BFE,#74B9FF);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

/* Glow background */
body::before, body::after{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  filter:blur(120px);
  z-index:-1;
}
body::before{ background:#ff6b8b; top:20%; left:-100px; }
body::after{ background:#7b56a3; bottom:10%; right:-100px; }

/* Container */
.container{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* Form wrapper */
.form-wrapper{
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(25px);
  border-radius:32px;
  border: 1px solid rgba(255,255,255,0.2);
  padding:60px 45px;
  width:100%;
  max-width:460px;
  box-shadow:0 30px 80px rgba(0,0,0,0.4);
  display:flex;
  flex-direction: column;
  align-items: center;
  animation: formFloat 1s ease-out;
}

/* Animation */
@keyframes formFloat{
  from { opacity:0; transform: translateY(60px) scale(0.92);}
  to { opacity:1; transform: translateY(0) scale(1);}
}

/* Logo */
.logo-main{
  font-size: clamp(2.8rem,10vw,4.2rem);
  font-weight:900;
  background: linear-gradient(135deg,#9D7BC9,#7B56A3);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:24px;
  text-align:center;
  filter: drop-shadow(0 12px 35px rgba(123,86,163,0.5));
}

/* Title & subtitle */
.form-title{ color:white; font-size: clamp(1.6rem,5vw,2rem); font-weight:800; margin-bottom:8px; }
.form-subtitle{ color: rgba(255,255,255,0.75); font-size: clamp(0.95rem,3.5vw,1.1rem); text-align:center; margin-bottom:40px; }

/* Form group */
.form-group{
  width:70%;
  position:relative;
  margin-bottom:28px;
}

/* Input icon */
.form-icon{
  position:absolute;
  left:20px;
  top:50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.5);
  font-size:20px;
  transition: all 0.3s ease;
  pointer-events:none;
}

/* Input field */
input{
  width:100%;
  height:60px;
  padding:0 20px 0 55px;
  border:2px solid rgba(255,255,255,0.2);
  border-radius:24px;
  background: rgba(255,255,255,0.12);
  color:white;
  font-size:16px;
  outline:none;
  box-shadow: inset 0 4px 16px rgba(0,0,0,0.25);
  transition: all 0.3s ease;
}

input::placeholder{ color: rgba(255,255,255,0.55); font-weight:400; }

input:focus{
  border-color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.18);
  box-shadow:0 0 0 4px rgba(255,255,255,0.12),0 12px 40px rgba(0,0,0,0.35);
}

input:focus + .form-icon{
  color:#ffd700;
  transform: translateY(-50%) scale(1.15);
  text-shadow:0 0 10px rgba(255,215,0,0.8);
}

/* Submit button */
.submit-btn{
  width:100%;
  height:64px;
  font-size:18px;
  font-weight:800;
  border-radius:24px;
  border:none;
  background: linear-gradient(135deg,#9D7BC9,#7B56A3);
  color:white;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  margin-top:20px;
  transition: all 0.3s ease;
}
.submit-btn:hover{ transform: translateY(-3px); }
.submit-btn:active{ transform: scale(0.97); }

/* Switch link */
.switch-link{
  display:block;
  width:70%;
  background: rgba(255,255,255,0.08);
  border:2px solid rgba(255,255,255,0.2);
  color:white;
  font-weight:700;
  font-size:15.5px;
  padding:18px 32px;
  margin-top:28px;
  border-radius:24px;
  text-align:center;
  text-decoration:none;
  backdrop-filter: blur(25px);
  transition: all 0.3s ease;
}
.switch-link:hover{ transform: translateY(-6px); border-color: rgba(255,255,255,0.45); }

/* Popup */
.popup-msg{ position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(120%); padding:20px 30px; border-radius:25px; font-weight:800; font-size:16px; max-width:90vw; z-index:10000; animation: popupShow 0.6s forwards; backdrop-filter: blur(20px);}
.popup-success{ background: linear-gradient(135deg,#4CAF50,#45a049); border:1px solid rgba(76,175,80,0.3); color:white; }
.popup-error{ background: linear-gradient(135deg,#f44336,#d32f2f); border:1px solid rgba(244,67,54,0.4); color:white; }

@keyframes popupShow{ to{ transform:translateX(-50%) translateY(0);} }
@keyframes popupHide{ to{ transform:translateX(-50%) translateY(120%); opacity:0;} }

/* Back home button */
.back-btn{
  position:absolute;
  top:30px;
  right:30px;
  width:56px;
  height:56px;
  font-size:18px;
  border:none;
  border-radius:50%;
  background: rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

/* Responsive */
@media(max-width:480px){
  .form-wrapper{ padding:40px 25px; width:100%; max-width:340px; }
  input{ height:55px; font-size:14px; padding-left:50px; }
  .submit-btn{ height:55px; font-size:16px; }
  .logo-main{ font-size:clamp(2rem,15vw,3rem); }
  .form-title{ font-size:1.5rem; }
  .form-subtitle{ font-size:0.9rem; }
  .switch-link{ padding:16px 24px; font-size:14px; margin-top:24px; }
}
</style>
</head>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log('✅ Service Worker Registered'))
      .catch(err => console.log('❌ SW Error:', err));
  });
}
</script>
<body>
<div class="container">
  <button class="back-btn" onclick="window.location.href='../homepage.html'" title="← Home">
    <i class="fas fa-home"></i>
  </button>

  <div class="form-wrapper">
    <div class="logo-main">DIDAS</div>
    <h3 class="form-title">Sign In</h3>
    <p class="form-subtitle">Secure access to your attendance dashboard</p>

    <form id="loginForm">
      <div class="form-group">
        <input type="email" id="loginEmail" placeholder="Email Address" required autocomplete="email">
        <i class="fas fa-envelope form-icon"></i>
      </div>
      <div class="form-group">
        <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
        <i class="fas fa-lock form-icon"></i>
      </div>
      <button type="submit" class="submit-btn">Sign In <i class="fas fa-arrow-right" style="margin-left:15px;"></i></button>
    </form>

    <a href="new-register.html" class="switch-link">New to DIDAS? Create Account</a>
  </div>
</div>

<div class="popup-msg popup-error" id="loginError" style="display:none;"></div>
<div class="popup-msg popup-success" id="loginSuccess" style="display:none;"></div>

<script src="/auth.js"></script>
<script> 
const loginError = document.getElementById('loginError');
const loginSuccess = document.getElementById('loginSuccess');

document.getElementById('loginForm').addEventListener('submit', e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  if(!email || !password){
    showPopup('loginError','Please enter email and password','error');
    return;
  }
  loginUser(email,password).then(result => {
    if (!result.success) {
      showPopup('loginError', result.error, 'error');
      return;
    }
    showPopup('loginSuccess', '✅ Login successful! Redirecting to dashboard...', 'success');
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1400);
  });
});

function showPopup(id,message,type){
  const el=document.getElementById(id);
  el.textContent=message;
  el.className=`popup-msg popup-${type}`;
  el.style.display='block';
  setTimeout(()=>{
    el.style.animation='popupHide 0.5s ease-out forwards';
    setTimeout(()=>el.style.display='none',500);
  },4500);
}
</script>
</body>
</html>
